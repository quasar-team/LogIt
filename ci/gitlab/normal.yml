.exec_base:
  stage: unstagged
  artifacts:
    paths:
      - build/
    when: always

.exec_win:
  extends: .exec_base
  image: gitlab-registry.cern.ch/jcop-opc-ua/common/images/win2025-build:latest
  tags:
    - win2025-container
  script:
    - cmake -B build $env:CMAKE_FLAGS
    - cmake --build build --config Release

.exec_lin:
  extends: .exec_base
  image: gitlab-registry.cern.ch/jcop-opc-ua/common/images/alma-10-build:latest
  script:
    - cmake -B build $CMAKE_FLAGS
    - cmake --build build --config Release

.exec_lin_system_boost:
  extends: .exec_base
  image: gitlab-registry.cern.ch/linuxsupport/alma10-base:latest
  script:
    - dnf install -y boost-devel
    - dnf install -y cmake gcc-c++ make
    - cmake -B build $CMAKE_FLAGS
    - cmake --build build --config Release

Compile [Windows 2025]:
  extends: .exec_win
  parallel:
    matrix:
      - PROFILE: "STDOUT"
        CMAKE_FLAGS: "-DLOGIT_BACKEND_STDOUTLOG=ON"
      - PROFILE: "STDOUT + BOOST"
        CMAKE_FLAGS: "-DLOGIT_BACKEND_STDOUTLOG=ON -DLOGIT_BACKEND_BOOSTLOG=ON"
      - PROFILE: "STDOUT + UATRACE"
        CMAKE_FLAGS: "-DLOGIT_BACKEND_STDOUTLOG=ON -DLOGIT_BACKEND_UATRACE=ON"
      - PROFILE: "STDOUT + WINDOWS_DEBUGGER"
        CMAKE_FLAGS: "-DLOGIT_BACKEND_STDOUTLOG=ON -DLOGIT_BACKEND_WINDOWS_DEBUGGER=ON"
      - PROFILE: "ALL"
        CMAKE_FLAGS: "-DLOGIT_BACKEND_STDOUTLOG=ON -DLOGIT_BACKEND_BOOSTLOG=ON -DLOGIT_BACKEND_UATRACE=ON -DLOGIT_BACKEND_WINDOWS_DEBUGGER=ON"

Compile [Linux Alma10]:
  extends: .exec_lin
  parallel:
    matrix:
      - PROFILE: "STDOUT"
        CMAKE_FLAGS: "-DLOGIT_BACKEND_STDOUTLOG=ON"
      - PROFILE: "STDOUT + BOOST"
        CMAKE_FLAGS: "-DLOGIT_BACKEND_STDOUTLOG=ON -DLOGIT_BACKEND_BOOSTLOG=ON"
      - PROFILE: "STDOUT + UATRACE"
        CMAKE_FLAGS: "-DLOGIT_BACKEND_STDOUTLOG=ON -DLOGIT_BACKEND_UATRACE=ON"
      - PROFILE: "ALL"
        CMAKE_FLAGS: "-DLOGIT_BACKEND_STDOUTLOG=ON -DLOGIT_BACKEND_BOOSTLOG=ON -DLOGIT_BACKEND_UATRACE=ON -DLOGIT_BACKEND_WINDOWS_DEBUGGER=ON"

Compile [Linux Alma10 Base System Boost]:
  extends: .exec_lin_system_boost
  variables:
    PROFILE: "STDOUT + BOOST (SYSTEM)"
    CMAKE_FLAGS: "-DLOGIT_BACKEND_STDOUTLOG=ON -DLOGIT_BACKEND_BOOSTLOG=ON"

Compile [Linux LOGIT_BACKENDS stdout]:
  extends: .exec_lin
  variables:
    LOGIT_BACKENDS: "LOGIT_BACKEND_STDOUTLOG"

Compile [Linux LOGIT_BACKENDS stdout boost]:
  extends: .exec_lin_system_boost
  variables:
    LOGIT_BACKENDS: "LOGIT_BACKEND_STDOUTLOG;LOGIT_BACKEND_BOOSTLOG"

Run Clang Analysis on Linux:
  stage: unstagged
  image: gitlab-registry.cern.ch/jcop-opc-ua/common/images/alma-10-build:latest
  needs: []
  artifacts:
    paths:
      - build-clang/
    when: always
  script:
    - dnf clean all
    - dnf -y install clang clang-tools-extra clang-analyzer
    - bash ci/run-clang-analysis-linux.sh
